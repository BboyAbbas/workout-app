<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Workout</title>
  <meta name="description" content="Minimal workout tracker" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"><!-- rendered by js/app.js --></div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker for offline support.
    // updateViaCache:'none' -> always revalidate sw.js (never serve a stale worker).
    // controllerchange -> when a new worker takes over, reload once so the latest
    // code shows immediately (no manual double-refresh).
    if ('serviceWorker' in navigator) {
      let reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloaded) return;
        reloaded = true;
        location.reload();
      });
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' });
          reg.update();
        } catch (_) {}
      });
    }
  </script>
</body>
</html>
